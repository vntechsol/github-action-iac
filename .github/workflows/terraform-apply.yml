name: "Merge PR to deploy"
permissions:
  id-token: write
  contents: read
  issues: read

on:
  workflow_call:
    inputs:
      path:
        description: "Specifies the path of the root terraform module."
        required: true
        type: string
      gh_environment:
        description: "Specifies the GitHub deployment environment."
        required: true
        type: string
    secrets:
      aws_role_to_assume:
        description: "Specifies the AWS_GITHUB_ACTION_ROLE."
        required: true
      aws_default_region:
        description: "Specifies the AWS_DEFAULT_REGION."
        required: true
      terraform_version:
        description: "Specifies the TERRAFORM_VERSION."
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.gh_environment }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.path }}
    env:
      ###AWS Provider details###
      AWS_GITHUB_ACTION_ROLE: ${{ secrets.aws_role_to_assume }}
      AWS_DEFAULT_REGION: ${{ secrets.aws_default_region }}
      TERRAFORM_VERSION: ${{ secrets.terraform_version }}

    steps:
      - name: SSH Setup
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: |
            ${{ secrets.DEPLOY_SSH_KEY }}
            #${{ secrets.LN_SSH_KEY }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_to_assume }}
          aws-region: ${{ secrets.aws_default_region }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: 'main'
          ssh-private-key: |
            ${{ secrets.DEPLOY_SSH_KEY }}
            #${{ secrets.LN_SSH_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ secrets.terraform_version }}

      - name: Terraform Init
        id: init
        run: terraform init -get=true -input=false -reconfigure

      # Terraform apply
      - name: Terraform Apply
        if: github.ref == 'refs/heads/"main"' && github.event_name == 'push'
        id: apply
        run: terraform apply -auto-approve -lock=false -refresh=true